name: Log Zion OS update

on:
  push:
    branches: [main]
    paths:
      - "index.html"

jobs:
  log-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Insert changelog entry into Supabase
        env:
          SUPABASE_URL: "https://kvwwjyvkoiqsvpyzbcmn.supabase.co"
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git log -1 --pretty=%H)
          ID="cl_gh_${COMMIT_SHA:0:12}"
          SAFE_MSG=$(echo "$COMMIT_MSG" | sed 's/"/\\"/g')

          echo "ID: $ID"
          echo "Title: $SAFE_MSG"
          echo "Key length: ${#SUPABASE_ANON_KEY}"

          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -X POST "$SUPABASE_URL/rest/v1/changelog" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "{\"id\": \"$ID\", \"title\": \"$SAFE_MSG\", \"description\": \"Pushed to Zion OS.\", \"category\": \"improvement\"}")

          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat response.txt

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "FAILED — Supabase rejected the request."
            exit 1
          fi
