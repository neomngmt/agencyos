name: Log Zion OS update

on:
  push:
    branches: [main]
    paths:
      - "index.html"

jobs:
  log-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Insert changelog entry into Supabase (minimal diagnostic)
        env:
          SUPABASE_URL: "https://kvwwjyvkoiqsvpyzbcmn.supabase.co"
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -v -X POST "$SUPABASE_URL/rest/v1/changelog" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"id":"cl_test_minimal_001","title":"Minimal test","description":"debug","category":"improvement"}'
